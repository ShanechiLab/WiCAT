dataset:
  name: kondo
  _target_: wicat.data.kondo_dataset.KondoWidefieldDataset
  config:
    save_dir: ./data/kondo_processed
    raw_data_dir: ./data/kondo_raw
    processed_data_dir: ./data/kondo_processed
